<!DOCTYPE html>
<html>
<body>

<h2>💸 Daily Expense</h2>

<!-- Quick buttons -->
<button onclick="quickAdd('Cigarettes', 580)">🚬 Cigarettes</button>
<button onclick="quickAdd('Groceries', 0)">🛒 Groceries</button>
<button onclick="quickAdd('Coffee', 300)">☕ Coffee</button>

<br><br>

<input id="item" placeholder="What did you buy?" />
<input id="amount" type="number" placeholder="Amount (¥)" />

<button onclick="submitData()">Add Expense</button>

<script>
function quickAdd(item, amount) {
  document.getElementById("item").value = item;
  document.getElementById("amount").value = amount;
}

function submitData() {
  const item = document.getElementById("item").value;
  const amount = document.getElementById("amount").value;

  if (!item || !amount) {
    alert("Enter both fields");
    return;
  }

  const url = "https://script.google.com/macros/s/AKfycbxMiLy2QKYXjzDLmKXxilbLmnc_Q9htqZVFpJj6_PIU_f5RFosByua8J9GYsbne_rE9Ug/exec"
    + "?item=" + encodeURIComponent(item)
    + "&amount=" + encodeURIComponent(amount);

  fetch(url);

  document.getElementById("item").value = "";
  document.getElementById("amount").value = "";
}
</script>

</body>
</html>
