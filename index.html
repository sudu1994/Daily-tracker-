<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense Tracker</title>

  <style>
    body {
      font-family: -apple-system;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: black;
      color: white;
    }

    button:active {
      background: #333;
    }
  </style>
</head>

<body>
  <h2>💸 Daily Expense</h2>
  <button onclick="quickAdd('Cigarettes', 580)">🚬 Cigarettes</button>
<button onclick="quickAdd('Groceries', 0)">🛒 Groceries</button>
<button onclick="quickAdd('Coffee', 300)">☕ Coffee</button>
  <input id="item" placeholder="What did you buy?" />
  <input id="amount" type="number" placeholder="Amount (¥)" />

  <button onclick="submitData()">Add Expense</button>

 <script>
  function submitData() {
    const item = document.getElementById("item").value;
    const amount = document.getElementById("amount").value;

    if (!item || !amount) {
      alert("Enter both fields");
      return;
    }

    fetch("YOUR_SCRIPT_URL", {"https://script.google.com/macros/s/AKfycbyKRumIv3NE3Zrj9PrfVvwQVoc81WFMhpq-WuKkwPc4Ez-pTOjcvkSU3R_wqmR0uoMMWQ/exec"
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({ item, amount })
    });

    document.getElementById("item").value = "";
    document.getElementById("amount").value = "";
  }

  function quickAdd(item, amount) {
    document.getElementById("item").value = item;
    document.getElementById("amount").value = amount;
  }
</script>
</body>
</html>
