<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense Tracker</title>
</head>

<body>

<h2>💸 Daily Expense</h2>

<!-- Quick buttons -->
<button onclick="quickAdd('Cigarettes', 580)">🚬 Cigarettes</button>
<button onclick="quickAdd('Groceries', 0)">🛒 Groceries</button>
<button onclick="quickAdd('Coffee', 300)">☕ Coffee</button>

<br><br>

<input id="item" placeholder="What did you buy?" />
<input id="amount" type="number" placeholder="Amount (¥)" />

<button onclick="submitData()">Add Expense</button>

<script>
function quickAdd(item, amount) {
  document.getElementById("item").value = item;
  document.getElementById("amount").value = amount;
}

function submitData() {
  const item = document.getElementById("item").value;
  const amount = document.getElementById("amount").value;

  if (!item || !amount) {
    alert("Enter both fields");
    return;
  }

  fetch("YOUR_NEW_SCRIPT_URL", {"https://script.google.com/macros/s/AKfycbwHCkz3ikbUtP2gw8RQgiDt-hqhtT3GlhcezSqHH9yz-xFjhi0cYM6AX5NRLoe7Vva_1w/exec"
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    item: item,
    amount: amount
  })
})
.then(res => res.text())
.then(data => console.log(data))
.catch(err => console.error(err));

  document.getElementById("item").value = "";
  document.getElementById("amount").value = "";
}
</script>

</body>
</html>
