<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Expense</title>

<style>
body {
  font-family: -apple-system;
  background: #f2f2f7;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 15px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

button {
  padding: 15px;
  border-radius: 14px;
  border: none;
  background: #eee;
  font-size: 18px;
}

button:active {
  background: #ccc;
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid #ddd;
}

.primary {
  background: black;
  color: white;
}

/* status text */
#status {
  text-align: center;
  margin-bottom: 10px;
  color: #666;
  font-size: 14px;
  height: 20px;
}
</style>
</head>

<body>

<div class="container">

<h2>💸 Expenses</h2>

<!-- ✅ status message -->
<div id="status"></div>

<div class="card grid">
  <button id="cig">🚬</button>
  <button id="other">🤑</button>
  <button id="grocery">🛒</button>
</div>

<div class="card">
  <input id="item" placeholder="Item">
  <input id="amount" type="number" placeholder="Amount">

  <button class="primary" id="addBtn">Add</button>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxMiLy2QKYXjzDLmKXxilbLmnc_Q9htqZVFpJj6_PIU_f5RFosByua8J9GYsbne_rE9Ug/exec";

// 🔥 send with feedback
function send(item, amount) {
  const status = document.getElementById("status");
  const url = API_URL + "?item=" + encodeURIComponent(item) + "&amount=" + encodeURIComponent(amount);

  status.innerText = "Saving...";

  fetch(url)
    .then(() => {
      status.innerText = "Added ✓";
    })
    .catch(() => {
      status.innerText = "Error ❌";
    });

  if (navigator.vibrate) navigator.vibrate(30);

  // clear message
  setTimeout(() => {
    status.innerText = "";
  }, 1500);
}

// wait until page loads
document.addEventListener("DOMContentLoaded", () => {

  // 🚬 one tap save
  document.getElementById("cig").addEventListener("click", () => {
    send("Cigarettes", 580);
  });

  // 🤑 manual entry helper
  document.getElementById("other").addEventListener("click", () => {
    document.getElementById("item").value = "Other";
    document.getElementById("amount").focus();
  });

  // 🛒 groceries helper
  document.getElementById("grocery").addEventListener("click", () => {
    document.getElementById("item").value = "Groceries";
    document.getElementById("amount").focus();
  });

  // add button
  document.getElementById("addBtn").addEventListener("click", () => {
    const item = document.getElementById("item").value;
    const amount = document.getElementById("amount").value;

    if (!item || !amount) return;

    send(item, amount);

    document.getElementById("item").value = "";
    document.getElementById("amount").value = "";
  });

});
</script>

</body>
</html>
